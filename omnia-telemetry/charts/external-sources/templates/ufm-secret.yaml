{{- if and .Values.enabled .Values.ufm.enabled (not .Values.ufm.credentials.existingSecret) }}
{{- $ns := include "external-sources.namespace" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: ufm-telemetry-credentials
  namespace: {{ $ns }}
  labels:
    {{- include "external-sources.labels" . | nindent 4 }}
type: Opaque
{{- if eq .Values.ufm.authMode "basic" }}
stringData:
  username: {{ .Values.ufm.credentials.username | quote }}
  password: {{ .Values.ufm.credentials.password | quote }}
{{- end }}
{{- end }}
