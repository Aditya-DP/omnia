{{- if .Values.enabled }}
{{- $ns := include "idrac.namespace" . -}}
{{- $secretName := include "idrac.secretName" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: idrac-telemetry
  namespace: {{ $ns }}
  labels:
    {{- include "idrac.labels" . | nindent 4 }}
spec:
  podManagementPolicy: Parallel
  serviceName: idrac-telemetry
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: idrac-telemetry
  template:
    metadata:
      labels:
        app: idrac-telemetry
        {{- include "idrac.labels" . | nindent 8 }}
    spec:
      volumes:
        {{- if .Values.collectionTargets.kafka }}
        - name: kafka-cluster-ca-cert
          secret:
            secretName: kafka-cluster-ca-cert
            items:
              - key: ca.crt
                path: ca.crt
        - name: kafkapump-user-certs
          secret:
            secretName: kafkapump
            items:
              - key: user.crt
                path: user.crt
              - key: user.key
                path: user.key
              - key: ca.crt
                path: ca.crt
        {{- end }}
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - "mysqldb"
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      tolerations:
        - effect: NoExecute
          key: node.kubernetes.io/not-ready
          operator: Exists
          tolerationSeconds: 5
        - effect: NoExecute
          key: node.kubernetes.io/unreachable
          operator: Exists
          tolerationSeconds: 5
      initContainers:
        - name: cleanup-mysql-locks
          image: {{ include "idrac.image" (dict "image" .Values.images.mysql "global" .Values.global) }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Checking for stale MySQL lock files..."
              rm -f /var/lib/mysql/*.sock /var/lib/mysql/*.pid 2>/dev/null || true
              echo "Lock file cleanup complete"
          volumeMounts:
            - name: mysqldb-pvc
              mountPath: /var/lib/mysql/
      containers:
        - name: mysqldb
          image: {{ include "idrac.image" (dict "image" .Values.images.mysql "global" .Values.global) }}
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: mysqldb-pvc
              mountPath: /var/lib/mysql/
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "mysqladmin shutdown -uroot -p${MYSQL_ROOT_PASSWORD} 2>/dev/null || true"]
          env:
            - name: MYSQL_DATABASE
              value: {{ .Values.mysql.database }}
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: mysqldb_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: mysqldb_password
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: mysqldb_root_password
          resources:
            requests:
              cpu: {{ .Values.mysql.resources.requests.cpu | quote }}
              memory: {{ .Values.mysql.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.mysql.resources.limits.cpu | quote }}
              memory: {{ .Values.mysql.resources.limits.memory | quote }}
          ports:
            - containerPort: {{ .Values.mysql.port }}
            - containerPort: 33060

        - name: activemq
          image: {{ include "idrac.image" (dict "image" .Values.images.activemq "global" .Values.global) }}
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: {{ .Values.activemq.resources.requests.cpu | quote }}
              memory: {{ .Values.activemq.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.activemq.resources.limits.cpu | quote }}
              memory: {{ .Values.activemq.resources.limits.memory | quote }}
          ports:
            - containerPort: {{ .Values.activemq.ports.http }}
            - containerPort: {{ .Values.activemq.ports.openwire }}

        - name: idrac-telemetry-receiver
          image: {{ include "idrac.image" (dict "image" .Values.images.receiver "global" .Values.global) }}
          imagePullPolicy: IfNotPresent
          env:
            - name: MESSAGEBUS_HOST
              value: "127.0.0.1"
            - name: MESSAGEBUS_PORT
              value: {{ .Values.activemq.ports.stomp | quote }}
            - name: CONFIGUI_HTTP_PORT
              value: {{ .Values.receiver.configUiPort | quote }}
            - name: MYSQL_DATABASE
              value: {{ .Values.mysql.database }}
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: mysqldb_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: mysqldb_password
            - name: MYSQL_HOST
              value: "mysqldb"
            - name: MYSQL_HOST_PORT
              value: {{ .Values.mysql.port | quote }}
          resources:
            requests:
              cpu: {{ .Values.receiver.resources.requests.cpu | quote }}
              memory: {{ .Values.receiver.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.receiver.resources.limits.cpu | quote }}
              memory: {{ .Values.receiver.resources.limits.memory | quote }}

        {{- if .Values.collectionTargets.kafka }}
        - name: kafka-pump
          image: {{ include "idrac.image" (dict "image" .Values.images.kafkaPump "global" .Values.global) }}
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /extrabin/certs/kafka-certs
              name: kafkapump-user-certs
              readOnly: true
            - mountPath: /extrabin/certs/cluster-ca
              name: kafka-cluster-ca-cert
              readOnly: true
          env:
            - name: MESSAGEBUS_HOST
              value: "127.0.0.1"
            - name: MESSAGEBUS_PORT
              value: {{ .Values.activemq.ports.stomp | quote }}
            - name: KAFKA_BROKER
              value: "kafka-kafka-bootstrap.{{ $ns }}.svc.cluster.local:9093"
            - name: KAFKA_TOPIC
              value: {{ .Values.kafkaPump.topic | quote }}
            - name: KAFKA_CACERT
              value: "cluster-ca/ca.crt"
            - name: KAFKA_CLIENT_CERT
              value: "kafka-certs/user.crt"
            - name: KAFKA_CLIENT_KEY
              value: "kafka-certs/user.key"
            - name: KAFKA_SKIP_VERIFY
              value: {{ .Values.kafkaPump.skipVerify | quote }}
            - name: KAFKA_PARTITION
              value: "0"
          resources:
            requests:
              cpu: {{ .Values.kafkaPump.resources.requests.cpu | quote }}
              memory: {{ .Values.kafkaPump.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.kafkaPump.resources.limits.cpu | quote }}
              memory: {{ .Values.kafkaPump.resources.limits.memory | quote }}
        {{- end }}

        {{- if .Values.collectionTargets.victoriaMetrics }}
        - name: victoria-pump
          image: {{ include "idrac.image" (dict "image" .Values.images.victoriaPump "global" .Values.global) }}
          imagePullPolicy: IfNotPresent
          env:
            - name: MESSAGEBUS_HOST
              value: "127.0.0.1"
            - name: MESSAGEBUS_PORT
              value: {{ .Values.activemq.ports.stomp | quote }}
            - name: MESSAGEBUS_TYPE
              value: stomp
          resources:
            requests:
              cpu: {{ .Values.victoriaPump.resources.requests.cpu | quote }}
              memory: {{ .Values.victoriaPump.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.victoriaPump.resources.limits.cpu | quote }}
              memory: {{ .Values.victoriaPump.resources.limits.memory | quote }}
          ports:
            - containerPort: {{ .Values.victoriaPump.metricsPort }}
              name: victoriapump
        {{- end }}

  volumeClaimTemplates:
    - metadata:
        name: mysqldb-pvc
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.mysql.storage | quote }}
{{- end }}
