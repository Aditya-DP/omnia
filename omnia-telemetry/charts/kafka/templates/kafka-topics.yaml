{{- if .Values.enabled }}
{{- $ns := include "kafka.namespace" . -}}
{{- range $name, $topic := .Values.topics }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    strimzi.io/cluster: "kafka"
spec:
  partitions: {{ $topic.partitions }}
  replicas: {{ $topic.replicas }}
  config:
    cleanup.policy: delete
{{- end }}
{{- end }}
