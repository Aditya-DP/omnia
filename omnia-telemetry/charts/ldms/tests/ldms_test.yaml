suite: LDMS Sub-Chart Tests
templates:
  - templates/statefulset-agg.yaml
  - templates/statefulset-store.yaml
  - templates/secrets.yaml
  - templates/service-agg.yaml
  - templates/service-store.yaml
tests:
  # ===== AGGREGATOR =====
  - it: "LD-001: Aggregator StatefulSet created"
    template: templates/statefulset-agg.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: ldms-aggregator
      - equal:
          path: spec.replicas
          value: 1

  - it: "LD-001b: Aggregator replicas from values"
    template: templates/statefulset-agg.yaml
    set:
      aggregator.replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: "LD-001c: Aggregator has liveness probe"
    template: templates/statefulset-agg.yaml
    asserts:
      - exists:
          path: spec.template.spec.containers[0].livenessProbe

  # ===== STORE =====
  - it: "LD-002: Store StatefulSet created"
    template: templates/statefulset-store.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: ldms-store
      - equal:
          path: spec.replicas
          value: 1

  - it: "LD-003: Store has Kafka cert volumes"
    template: templates/statefulset-store.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: kafka-certs
          any: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: kafka-ca
          any: true

  # ===== SECRETS =====
  - it: "LD-004: OVIS auth Secret created"
    template: templates/secrets.yaml
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: ldms-ovis-auth

  - it: "LD-005: Munge key Secret created"
    template: templates/secrets.yaml
    documentIndex: 1
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: ldms-munge-key

  - it: "LD-006: Secrets NOT created when existingSecret set"
    template: templates/secrets.yaml
    set:
      auth.existingSecret: my-ovis-secret
      munge.existingSecret: my-munge-secret
    asserts:
      - hasDocuments:
          count: 0

  # ===== SERVICES =====
  - it: "LD-007: Aggregator headless Service"
    template: templates/service-agg.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: metadata.name
          value: ldms-aggregator

  - it: "LD-008: Store headless Service"
    template: templates/service-store.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: metadata.name
          value: ldms-store

  # ===== NAMESPACE =====
  - it: "LD-010: Resources use correct namespace"
    template: templates/statefulset-agg.yaml
    set:
      global.namespace: custom-ldms-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-ldms-ns
