apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: telemetryhealthpolicies.telemetry.omnia.dell.com
  labels:
    app.kubernetes.io/part-of: omnia-telemetry
spec:
  group: telemetry.omnia.dell.com
  names:
    kind: TelemetryHealthPolicy
    listKind: TelemetryHealthPolicyList
    plural: telemetryhealthpolicies
    singular: telemetryhealthpolicy
    shortNames:
      - thp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                targetNamespace:
                  type: string
                  description: Namespace to watch for unhealthy pods
                reconcileInterval:
                  type: string
                  description: How often to check pod health (e.g. "60s")
                  default: "60s"
                rules:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      type:
                        type: string
                        enum:
                          - TerminatingDuration
                          - ContainerState
                          - PendingDuration
                      selector:
                        type: object
                        properties:
                          matchLabels:
                            type: object
                            additionalProperties:
                              type: string
                          matchExpressions:
                            type: array
                            items:
                              type: object
                              properties:
                                key:
                                  type: string
                                operator:
                                  type: string
                                values:
                                  type: array
                                  items:
                                    type: string
                      parameters:
                        type: object
                        properties:
                          thresholdSeconds:
                            type: integer
                          minRestartCount:
                            type: integer
                          containerState:
                            type: string
                      actions:
                        type: array
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - RemoveFinalizers
                                - ForceDelete
                                - CleanPvcLockFiles
                                - Alert
                            parameters:
                              type: object
                              additionalProperties:
                                type: string
                    required:
                      - name
                      - type
                      - actions
            status:
              type: object
              properties:
                lastReconcileTime:
                  type: string
                  format: date-time
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                remediationCounts:
                  type: object
                  properties:
                    total:
                      type: integer
                    byRule:
                      type: object
                      additionalProperties:
                        type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Namespace
          type: string
          jsonPath: .spec.targetNamespace
        - name: Interval
          type: string
          jsonPath: .spec.reconcileInterval
        - name: Last Reconcile
          type: date
          jsonPath: .status.lastReconcileTime
        - name: Remediations
          type: integer
          jsonPath: .status.remediationCounts.total
