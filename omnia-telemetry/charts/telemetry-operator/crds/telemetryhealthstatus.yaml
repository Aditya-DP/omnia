apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: telemetryhealthstatuses.telemetry.omnia.dell.com
  labels:
    app.kubernetes.io/part-of: omnia-telemetry
spec:
  group: telemetry.omnia.dell.com
  names:
    kind: TelemetryHealthStatus
    listKind: TelemetryHealthStatusList
    plural: telemetryhealthstatuses
    singular: telemetryhealthstatus
    shortNames:
      - ths
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                targetNamespace:
                  type: string
            status:
              type: object
              properties:
                lastUpdateTime:
                  type: string
                  format: date-time
                podHealthSummary:
                  type: object
                  properties:
                    total:
                      type: integer
                    healthy:
                      type: integer
                    unhealthy:
                      type: integer
                    terminating:
                      type: integer
                    pending:
                      type: integer
                    crashLooping:
                      type: integer
                unhealthyPods:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                      phase:
                        type: string
                      reason:
                        type: string
                      age:
                        type: string
                      lastAction:
                        type: string
                      lastActionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Healthy
          type: integer
          jsonPath: .status.podHealthSummary.healthy
        - name: Unhealthy
          type: integer
          jsonPath: .status.podHealthSummary.unhealthy
        - name: Terminating
          type: integer
          jsonPath: .status.podHealthSummary.terminating
        - name: Last Update
          type: date
          jsonPath: .status.lastUpdateTime
