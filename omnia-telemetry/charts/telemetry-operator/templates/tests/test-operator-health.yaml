{{- if .Values.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-operator-test
  namespace: {{ include "telemetry-operator.namespace" . }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: "docker.io/library/busybox:1.36"
      command: ["sh", "-c"]
      args:
        - |
          echo "Testing Telemetry Operator health..."
          wget -q -O- http://telemetry-operator-metrics:{{ .Values.metrics.port }}/metrics | head -5 && echo "Metrics endpoint OK"
          echo "PASSED"
{{- end }}
