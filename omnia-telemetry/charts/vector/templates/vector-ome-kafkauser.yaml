{{- if and .Values.enabled .Values.ome.enabled }}
{{- $ns := include "vector.namespace" . -}}
{{- $omeId := .Values.ome.omeIdentifier -}}
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: {{ .Values.ome.kafkaUser }}
  namespace: {{ $ns }}
  labels:
    strimzi.io/cluster: "kafka"
    app: vector-ome
    component: telemetry-bridge
    subsystem: ome
    {{- include "vector.labels" . | nindent 4 }}
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: "{{ $omeId }}."
          patternType: prefix
        operations:
          - Read
          - Describe
        host: "*"
      - resource:
          type: group
          name: {{ .Values.ome.consumerGroup | quote }}
          patternType: literal
        operations:
          - Read
        host: "*"
{{- end }}
