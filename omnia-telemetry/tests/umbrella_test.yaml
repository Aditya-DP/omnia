suite: Umbrella Chart Tests
templates:
  - templates/namespace.yaml
  - templates/tls-cert-job.yaml
tests:
  # ===== NAMESPACE TESTS =====
  - it: "U-001: creates Namespace with default name"
    template: templates/namespace.yaml
    asserts:
      - isKind:
          of: Namespace
      - equal:
          path: metadata.name
          value: telemetry

  - it: "U-001b: creates Namespace with custom name"
    template: templates/namespace.yaml
    set:
      global.namespace: custom-ns
    asserts:
      - equal:
          path: metadata.name
          value: custom-ns

  - it: "U-002: Namespace has pre-install hook annotation"
    template: templates/namespace.yaml
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-install

  - it: "U-003: Namespace has standard labels"
    template: templates/namespace.yaml
    asserts:
      - exists:
          path: metadata.labels["app.kubernetes.io/part-of"]
      - equal:
          path: metadata.labels["app.kubernetes.io/part-of"]
          value: omnia-telemetry

  # ===== TLS CERT JOB TESTS =====
  - it: "U-004: TLS resources rendered when selfSigned enabled"
    template: templates/tls-cert-job.yaml
    asserts:
      - hasDocuments:
          count: 5

  - it: "U-005: TLS resources NOT rendered when existingSecret set"
    template: templates/tls-cert-job.yaml
    set:
      tls.existingSecret: my-existing-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: "U-009: TLS resources NOT rendered when tls.enabled=false"
    template: templates/tls-cert-job.yaml
    set:
      tls.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: "U-004b: TLS resources NOT rendered when selfSigned disabled"
    template: templates/tls-cert-job.yaml
    set:
      tls.selfSigned.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: "U-006: Cert validity days from values"
    template: templates/tls-cert-job.yaml
    set:
      tls.selfSigned.validityDays: 365
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["generate-certs.sh"]
          pattern: "VALIDITY=365"

  - it: "U-007: SANs include Victoria and Kafka FQDNs"
    template: templates/tls-cert-job.yaml
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["generate-certs.sh"]
          pattern: "vminsert-victoria-cluster"
      - matchRegex:
          path: data["generate-certs.sh"]
          pattern: "vlinsert-victoria-logs-cluster"
      - matchRegex:
          path: data["generate-certs.sh"]
          pattern: "kafka-kafka-bootstrap"

  - it: "U-008: Hook weights ensure correct ordering"
    template: templates/tls-cert-job.yaml
    asserts:
      # Document 0 = ConfigMap (weight -5)
      - documentIndex: 0
        isKind:
          of: ConfigMap
      - documentIndex: 0
        equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-5"
      # Document 1 = Job (weight -4)
      - documentIndex: 1
        isKind:
          of: Job
      - documentIndex: 1
        equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-4"
      # Document 2 = ServiceAccount (weight -6)
      - documentIndex: 2
        isKind:
          of: ServiceAccount
      - documentIndex: 2
        equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-6"

  - it: "U-008b: TLS Job references correct ServiceAccount"
    template: templates/tls-cert-job.yaml
    documentIndex: 1
    asserts:
      - isKind:
          of: Job
      - matchRegex:
          path: spec.template.spec.serviceAccountName
          pattern: "tls-sa$"

  - it: "U-010: All TLS resources use correct namespace"
    template: templates/tls-cert-job.yaml
    set:
      global.namespace: myns
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.namespace
          value: myns
      - documentIndex: 1
        equal:
          path: metadata.namespace
          value: myns
      - documentIndex: 2
        equal:
          path: metadata.namespace
          value: myns
