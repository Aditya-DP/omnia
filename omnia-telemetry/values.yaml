# =============================================================================
# OMNIA TELEMETRY - UNIFIED CONFIGURATION
# =============================================================================
# Single helm install deploys the entire telemetry stack.
# Architecture: SOURCES -> BRIDGES -> SINKS
# =============================================================================

# ---------------------------------------------------------------------------
# GLOBAL
# ---------------------------------------------------------------------------
global:
  namespace: telemetry
  imageRegistry: ""                    # Override for air-gapped (e.g. registry.internal:5000)
  imagePullSecrets: []
  storageClass: ""                     # Empty = cluster default

# ---------------------------------------------------------------------------
# TLS
# ---------------------------------------------------------------------------
tls:
  enabled: true
  # selfSigned: generate CA + certs via pre-install hook Job
  selfSigned:
    enabled: true
    validityDays: 3650
  # Use a pre-existing Secret instead
  existingSecret: ""

# ---------------------------------------------------------------------------
# SOURCES
# ---------------------------------------------------------------------------
sources:
  idrac:
    enabled: true
    collectionTargets:
      - victoria_metrics
      - kafka
  ldms:
    enabled: true
    collectionTargets:
      - kafka
  dcgm:
    enabled: true
  powerscale:
    metricsEnabled: true
    logsEnabled: true
    collectionTargets:
      - victoria_metrics
      - victoria_logs
  ufm:
    metricsEnabled: false
    logsEnabled: false
    collectionTargets:
      - victoria_metrics
      - victoria_logs
  vast:
    metricsEnabled: false
    logsEnabled: false
    collectionTargets:
      - victoria_metrics
      - victoria_logs
  ome:
    metricsEnabled: true
    logsEnabled: true
    collectionTargets:
      - kafka

# ---------------------------------------------------------------------------
# BRIDGES
# ---------------------------------------------------------------------------
bridges:
  vectorLdms:
    enabled: true
  vectorOme:
    metricsEnabled: true
    logsEnabled: true
    omeIdentifier: "ome"

# ---------------------------------------------------------------------------
# KAFKA SUB-CHART
# ---------------------------------------------------------------------------
kafka:
  enabled: true

  cluster:
    version: "4.1.0"
    metadataVersion: "4.1-IV0"
    replicas:
      controllers: 3
      brokers: 3
    storage:
      size: "8Gi"
    config:
      logRetentionHours: 168
      logRetentionBytes: -1
      logSegmentBytes: 1073741824
      minInsyncReplicas: 2
      defaultReplicationFactor: 3
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "1Gi"
        cpu: "1000m"

  bridge:
    enabled: true
    replicas: 1
    port: 8080
    service:
      type: LoadBalancer

  topics:
    idrac:
      partitions: 1
      replicas: 2
    ldms:
      partitions: 2
      replicas: 2

  entityOperator:
    userOperator:
      resources:
        requests:
          memory: "512Mi"
          cpu: "200m"
        limits:
          memory: "512Mi"
          cpu: "1000m"

  images:
    kafka: "quay.io/strimzi/kafka:0.48.0-kafka-4.1.0"
    bridge: "quay.io/strimzi/kafka-bridge:0.33.1"

# ---------------------------------------------------------------------------
# VICTORIA-METRICS SUB-CHART
# ---------------------------------------------------------------------------
victoria-metrics:
  enabled: true

  metrics:
    enabled: true
    deploymentMode: cluster            # cluster | single
    retention: "168h"
    persistenceSize: "8Gi"

    cluster:
      vmstorage:
        replicas: 3
        replicationFactor: 2
        dedupMinScrapeInterval: "1m"
        image: "victoriametrics/vmstorage:v1.128.0-cluster"
        terminationGracePeriod: 120
        tolerationSeconds: 5
        resources:
          requests: { memory: "1Gi", cpu: "250m" }
          limits: { memory: "2Gi", cpu: "1000m" }
        startupProbe:
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 30
          timeoutSeconds: 5
        readinessProbe:
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 10
          timeoutSeconds: 5

      vminsert:
        replicas: 2
        image: "victoriametrics/vminsert:v1.128.0-cluster"
        externalAccess: true
        resources:
          requests: { memory: "256Mi", cpu: "100m" }
          limits: { memory: "512Mi", cpu: "500m" }

      vmselect:
        replicas: 2
        image: "victoriametrics/vmselect:v1.128.0-cluster"
        maxQueryDuration: "5m"
        maxConcurrentRequests: "8"
        cacheDataPath: true
        resources:
          requests: { memory: "256Mi", cpu: "100m" }
          limits: { memory: "512Mi", cpu: "500m" }

    single:
      replicas: 1
      image: "victoriametrics/victoria-metrics:v1.128.0"

    vmagent:
      replicas: 2
      image: "victoriametrics/vmagent:v1.128.0"
      resources:
        requests: { memory: "128Mi", cpu: "50m" }
        limits: { memory: "512Mi", cpu: "250m" }

    additionalRemoteWriteEndpoints: []

    scrape:
      idrac:
        port: 2112
        path: /metrics
        interval: "30s"
      powerscaleOtel:
        port: 8889
        path: /metrics
        interval: "30s"
      csiVolumeExporter:
        port: 8080
        path: /metrics
        interval: "30s"

  logs:
    enabled: true
    retention: "168h"
    storageSize: "8Gi"

    cluster:
      vlstorage:
        replicas: 3
        replicationFactor: 2
        image: "victoriametrics/victoria-logs:v1.49.0"
        terminationGracePeriod: 120
        tolerationSeconds: 5
        resources:
          requests: { memory: "512Mi", cpu: "100m" }
          limits: { memory: "1Gi", cpu: "500m" }
        startupProbe:
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 30
          timeoutSeconds: 5
        readinessProbe:
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 10
          timeoutSeconds: 5

      vlinsert:
        replicas: 2
        image: "victoriametrics/victoria-logs:v1.49.0"
        externalAccess: true
        port: 9481
        resources:
          requests: { memory: "256Mi", cpu: "100m" }
          limits: { memory: "512Mi", cpu: "500m" }

      vlselect:
        replicas: 2
        image: "victoriametrics/victoria-logs:v1.49.0"
        port: 9471
        resources:
          requests: { memory: "256Mi", cpu: "100m" }
          limits: { memory: "512Mi", cpu: "500m" }

    vlagent:
      replicas: 1
      image: "victoriametrics/vlagent:v1.49.0"
      pvcSize: "5Gi"
      syslog:
        tcp: 514
        udp: 514
        tlsPort: 6514
      service:
        type: LoadBalancer
        nodePorts:
          tcp: 32399
          udp: 32400
      resources:
        requests: { memory: "64Mi", cpu: "25m" }
        limits: { memory: "256Mi", cpu: "100m" }

    additionalLogWriteEndpoints: []

  rbac:
    create: true
    serviceAccountName: "vmagent"

  busyboxImage: "docker.io/library/busybox:1.36"

# ---------------------------------------------------------------------------
# IDRAC SUB-CHART
# ---------------------------------------------------------------------------
idrac:
  enabled: true
  replicas: 1

  images:
    receiver: "docker.io/dellhpcomniaaisolution/idrac_telemetry_receiver:1.2"
    kafkaPump: "docker.io/dellhpcomniaaisolution/kafkapump:1.2"
    victoriaPump: "docker.io/dellhpcomniaaisolution/victoriapump:1.2"
    activemq: "docker.io/rmohr/activemq:5.15.9"
    mysql: "docker.io/library/mysql:9.3.0"

  collectionTargets:
    kafka: true
    victoriaMetrics: true

  mysql:
    storage: "1Gi"
    port: 3306
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits: { cpu: "500m", memory: "512Mi" }

  activemq:
    ports:
      http: 8161
      openwire: 61616
      stomp: 61613
    resources:
      requests: { cpu: "100m", memory: "512Mi" }
      limits: { cpu: "500m", memory: "1536Mi" }

  receiver:
    resources:
      requests: { cpu: "100m", memory: "128Mi" }
      limits: { cpu: "500m", memory: "256Mi" }

  kafkaPump:
    skipVerify: true
    resources:
      requests: { cpu: "50m", memory: "128Mi" }
      limits: { cpu: "200m", memory: "512Mi" }

  victoriaPump:
    metricsPort: 2112
    resources:
      requests: { cpu: "50m", memory: "128Mi" }
      limits: { cpu: "200m", memory: "512Mi" }

  terminationGracePeriodSeconds: 120

# ---------------------------------------------------------------------------
# LDMS SUB-CHART
# ---------------------------------------------------------------------------
ldms:
  enabled: true

  image: "docker.io/dellhpcomniaaisolution/ubuntu-ldms:1.1"

  aggregator:
    replicas: 1
    port: 6001
    transport: sock
    resources:
      requests: { cpu: "250m", memory: "512Mi" }
      limits: { cpu: "1000m", memory: "1Gi" }

  store:
    replicas: 1
    port: 6001
    resources:
      requests: { cpu: "250m", memory: "512Mi" }
      limits: { cpu: "1000m", memory: "1Gi" }

  sampler:
    port: 10001
    plugins:
      - name: meminfo
        config: ""
        interval: 30000000
      - name: procstat2
        config: ""
        interval: 30000000
      - name: vmstat
        config: ""
        interval: 30000000
      - name: loadavg
        config: ""
        interval: 30000000
      - name: procnetdev2
        config: ""
        interval: 30000000

  auth:
    existingSecret: ""
    secretWord: ""

  munge:
    existingSecret: ""

  network:
    nad:
      enabled: false

  secrets:
    createOvisAuth: true
    createMungeKey: true

# ---------------------------------------------------------------------------
# VECTOR SUB-CHART
# ---------------------------------------------------------------------------
vector:
  enabled: true

  image: "docker.io/timberio/vector:0.45.0-alpine"

  ldms:
    enabled: true
    replicas: 2
    resources:
      requests: { memory: "128Mi", cpu: "50m" }
      limits: { memory: "256Mi", cpu: "250m" }

  ome:
    enabled: true
    replicas: 2
    metricsEnabled: true
    logsEnabled: true
    omeIdentifier: "ome"
    resources:
      requests: { memory: "256Mi", cpu: "100m" }
      limits: { memory: "512Mi", cpu: "500m" }

  vmagentVector:
    enabled: true
    replicas: 2
    image: "victoriametrics/vmagent:v1.128.0"
    port: 8429
    pvcSize: "5Gi"
    resources:
      requests: { memory: "128Mi", cpu: "50m" }
      limits: { memory: "256Mi", cpu: "250m" }

  vlagentVector:
    enabled: true
    replicas: 2
    image: "victoriametrics/vlagent:v1.49.0"
    port: 9427
    pvcSize: "5Gi"
    resources:
      requests: { memory: "128Mi", cpu: "50m" }
      limits: { memory: "256Mi", cpu: "250m" }

# ---------------------------------------------------------------------------
# EXTERNAL-SOURCES SUB-CHART
# ---------------------------------------------------------------------------
external-sources:
  enabled: true

  ufm:
    enabled: false
    endpoint: ""
    port: 9001
    scrapeInterval: "30s"
    scrapeTimeout: "15s"
    tlsMode: "self_signed"
    caCertPath: ""
    authMode: "basic"
    credentials:
      existingSecret: ""
      username: ""
      password: ""

  vast:
    enabled: false
    endpoint: ""
    port: 443
    metricsPath: "/api/prometheusmetrics/all"
    scrapeInterval: "30s"
    scrapeTimeout: "15s"
    tlsMode: "self_signed"
    caCertPath: ""
    authMode: "basic"
    credentials:
      existingSecret: ""
      username: ""
      password: ""

  powerscale:
    csiVolumeExporter:
      enabled: true
      image: "docker.io/dellhpcomniaaisolution/csi-volume-exporter:1.0"
      port: 8080
      resources:
        requests: { cpu: "50m", memory: "64Mi" }
        limits: { cpu: "200m", memory: "256Mi" }

# ---------------------------------------------------------------------------
# TELEMETRY-OPERATOR SUB-CHART
# ---------------------------------------------------------------------------
telemetry-operator:
  enabled: true

  image: "docker.io/dellhpcomniaaisolution/telemetry-operator:0.1.0"
  replicas: 2

  resources:
    requests: { cpu: "50m", memory: "64Mi" }
    limits: { cpu: "200m", memory: "128Mi" }

  defaultPolicy:
    create: true
    stuckTerminating:
      thresholdSeconds: 60
      kafkaThresholdSeconds: 300
    crashLoopBackoff:
      minRestartCount: 5
    pendingTooLong:
      thresholdSeconds: 300
